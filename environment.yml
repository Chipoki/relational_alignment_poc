name: relational_alignment_env
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.10
  - pip
  # Core scientific
  - numpy=1.26.*
  - scipy=1.13.*
  - pandas=2.2.*
  - scikit-learn=1.5.*
  # Neuroimaging
  - nilearn=0.10.*
  - nibabel=5.2.*
  # Deep learning (CPU-only build for i7-13700H portability; CUDA optional)
  - pytorch::pytorch=2.2.*
  - pytorch::torchvision=0.17.*
  - pytorch::cpuonly
  # Visualization
  - matplotlib=3.9.*
  - seaborn=0.13.*
  # Utilities
  - tqdm=4.66.*
  - pyyaml=6.0.*
  - pip:
      - pot==0.9.3          # Python Optimal Transport (Gromov-Wasserstein)
      - umap-learn==0.5.6   # UMAP for Meta-MDS visualizations
