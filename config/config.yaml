# ============================================================
#  POC: Relational Alignment of Conscious / Unconscious Reps
#  Master Configuration
# ============================================================

# ── Data source selector ──────────────────────────────────────
# "derivatives"  → use ds003927/derivatives/ (pre-stacked wholebrain_*.nii.gz
#                  + wholebrain_*.csv; whole-brain BOLD already separated by
#                  visibility state; ROI masks in func_masks/ if present)
# "replication"  → use author_replication/MRI/ (per-run ICAed_filtered/filtered.nii.gz
#                  + ctx-{lh,rh}-<roi>_BOLD.nii.gz bilateral masks in anat/ROI_BOLD/;
#                  behavioural events read from ds003927/<sub>/ses-XX/func/*.tsv)
data_source: "replication"   # <── toggle here: "derivatives" | "replication"

# ── Data paths ────────────────────────────────────────────────
data:
  # --- derivatives mode root ---
  # Layout: <derivatives_root>/<sub-XX>/
  #   wholebrain_conscious.nii.gz / .csv
  #   wholebrain_unconscious.nii.gz / .csv
  #   mask.nii.gz
  #   example_func.nii.gz
  #   func_masks/<roi>_mask.nii.gz   (optional; whole-brain used if absent)
  derivatives_root: "/home/tomerd/Documents/projects/MSc/lab/thesis_practice/relational_alignment/soto_data/ds003927/derivatives"

  # --- replication mode roots ---
  # BOLD + ROI masks:
  #   <replication_root>/MRI/<sub-XX>/func/session-<SS>/<sub-XX>_unfeat_run-<R>/
  #     outputs/func/ICAed_filtered/filtered.nii.gz
  #     outputs/func/MC/MCflirt.par
  #   <replication_root>/MRI/<sub-XX>/anat/ROI_BOLD/
  #     ctx-lh-<roi>_BOLD.nii.gz  (bilateral: union of lh + rh)
  #     ctx-rh-<roi>_BOLD.nii.gz
  replication_root: "/home/tomerd/Documents/projects/MSc/lab/thesis_practice/relational_alignment/soto_data/author_replication"

  # --- ds003927 BIDS root (always needed for raw event TSVs in replication mode) ---
  # Layout: <ds003927_root>/<sub-XX>/ses-<SS>/func/
  #   <sub-XX>_ses-<SS>_task-recog_run-<R>_events.tsv
  # Also used as source of derivatives/ for "derivatives" mode.
  ds003927_root: "/home/tomerd/Documents/projects/MSc/lab/thesis_practice/relational_alignment/soto_data/ds003927"

  subject_ids: []           # Leave empty to auto-discover from the active root
  n_subjects: 7
  n_sessions: 7
  session_start: 1          # First session number (ds003927 / author_replication sessions are 2–7;
                             # session 1 is a localiser and contains no task-recog events)
  n_runs_per_session: 9     # Used in replication mode to iterate run folders
  tr: 0.85                  # Repetition time in seconds
  hrf_delay_seconds: 5.0
  n_hrf_volumes: 1          # 1 when using derivatives (already HRF-averaged);
                             # set higher for replication raw runs if needed

  # Replication-mode pre-processing options (matching aroma_decoding_pipeline_v11)
  replication_detrend: true         # nilearn.signal.clean(detrend=True) per run
  replication_zscore_per_run: true  # temporal Z-score on sliced trials per run

  stimuli_csv_col:
    label:      "labels"
    category:   "targets"
    visibility: "visibility"
    volume:     "volume_interest"
    onset:      "onset"
  visibility_states:
    - "conscious"
    - "unconscious"
  nifti_prefix:   "wholebrain"
  mask_filename:  "mask.nii.gz"

# ── ROI names (FreeSurfer aparc+aseg labels, without ctx-{lh,rh}- prefix) ─
# Used in derivatives mode for func_masks/<roi>_mask.nii.gz lookup.
# In replication mode these are discovered automatically from
# author_replication/MRI/<sub>/anat/ROI_BOLD/ctx-lh-<roi>_BOLD.nii.gz.
rois:
  - pericalcarine
  - lingual
  - lateraloccipital
  - fusiform
  - inferiortemporal
  - parahippocampal
  - precuneus
  - inferiorparietal
  - superiorparietal
  - superiorfrontal
  - rostralmiddlefrontal
  - parsopercularis
  - parsorbitalis
  - parstriangularis

# ── FCNN settings (Phase 1) ───────────────────────────────────
fcnn:
  backbone: "mobilenet_v2"
  pretrained: true
  noise_levels:
    clear: 0
    chance: 300
  n_noise_sessions: 20
  batch_size: 8
  device: "cpu"

# ── RDM settings (Phase 2) ────────────────────────────────────
rdm:
  distance: "spearman"
  n_stimuli: 96

# ── RSA / SVM settings (Phase 3 / Phase 0.2) ─────────────────
rsa:
  n_permutations: 10000
  alpha: 0.05
  correction: "bonferroni"
  seed: 42
  # SVM hyperparameters (Mei et al. 2022 / aroma_decoding_pipeline_v11)
  svm_C: 1.0
  svm_n_perms: 10000
  svm_tol: 1.0e-3
  svm_max_iter: 10000
  svm_random_state: 12345   # matches v11 random_state

# ── Gromov-Wasserstein (Phases 4 & 5) ─────────────────────────
gromov_wasserstein:
  loss_fun: "square_loss"
  armijo: false
  log: true
  top_k: 5
  n_permutations: 10000

# ── Visualization ─────────────────────────────────────────────
visualization:
  output_dir: "figures"
  dpi: 150
  meta_mds_n_components: 2

# ── Output ────────────────────────────────────────────────────
output:
  parent_dir: "/home/tomerd/Documents/projects/MSc/lab/thesis_practice/relational_alignment/poc_output"
  # subject_rdm_dir: "/path/to/custom/subject_rdms"
  # Optional override for the per-subject RDM archive directory written by
  # --dump-subject-rdms and read by --from-subject-rdms.
  # Default: <output.parent_dir>/checkpoints/subject_rdms/
